name: Bug report
description: Report a reproducible gameplay, rendering, input, or crash issue
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing the alpha. Do not attach a ROM, generated recompilation output, extracted game assets, or your entire user-data directory.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Steam Deck / Linux x86-64
        - macOS Apple silicon
        - Windows x86-64
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.17-alpha or commit SHA
    validations:
      required: true
  - type: input
    id: scene
    attributes:
      label: Scene
      placeholder: Character select, Adventure overworld, Ancient Lake race, etc.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Describe the shortest sequence that triggers the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Attach crash.log or a short relevant excerpt from runtime.log after checking that it contains no private paths or game data.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Private-data check
      options:
        - label: I did not attach a ROM, generated recompilation output, extracted assets, or save/config archives containing the locally stored ROM.
          required: true

